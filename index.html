<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spot On TMS — Internal SOP Library</title>
    <meta name="description" content="Spot On TMS internal standard operating procedures library.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Mermaid.js for BPM flowcharts -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ===================== PASSWORD GATE ===================== -->
    <div id="passwordGate" class="password-gate">
        <div class="password-card">
            <div class="password-logo">
                <span class="logo-text">Spot On <span class="logo-accent">TMS</span></span>
            </div>
            <h1 class="password-title">Internal Portal</h1>
            <p class="password-subtitle">Enter your access code to continue</p>
            <div class="password-input-wrap">
                <input type="password" id="passwordInput" placeholder="Access code" autocomplete="off" />
                <button id="passwordSubmit" onclick="checkPassword()">&#8594;</button>
            </div>
            <p id="passwordError" class="password-error hidden">Incorrect access code. Please try again.</p>
        </div>
    </div>

    <!-- ===================== MAIN APP ===================== -->
    <div id="appRoot" class="app-container hidden">

        <!-- Top Navigation Bar -->
        <header class="top-nav">
            <div class="top-nav-left">
                <button id="backBtn" class="back-btn hidden" onclick="goBack()">&#8592; Back</button>
                <span class="logo-text nav-logo">Spot On <span class="logo-accent">TMS</span></span>
            </div>
            <div class="top-nav-center">
                <h2 id="pageTitle" class="page-title">SOP Library</h2>
            </div>
            <div class="top-nav-right">
                <div class="search-wrap" id="searchWrap">
                    <input type="text" id="searchInput" placeholder="Search SOPs..." autocomplete="off">
                </div>
            </div>
        </header>

        <!-- ===== VIEW: HOME (Tiles) ===== -->
        <div id="viewHome" class="view">
            <div class="home-intro">
                <p class="home-subtitle">Select a position to view its standard operating procedures</p>
            </div>
            <div class="tiles-grid" id="tilesGrid">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- ===== VIEW: SOP LIST for a position ===== -->
        <div id="viewSOPList" class="view hidden">
            <div class="sop-list-grid" id="sopListGrid">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- ===== VIEW: SOP CONTENT ===== -->
        <div id="viewSOPContent" class="view hidden">
            <div class="sop-content-wrapper">
                <div class="sop-content-header">
                    <h1 id="sopContentTitle" class="sop-content-title"></h1>
                    <div id="sopContentMeta" class="sop-content-meta"></div>
                </div>
                <div id="sopContentBody" class="sop-content-body markdown-body">
                    <!-- Markdown rendered here -->
                </div>
            </div>
        </div>

    </div>

    <!-- Password Gate Logic -->
    <script>
        const PORTAL_PASSWORD = 'spoton2025';

        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            const errorEl = document.getElementById('passwordError');
            if (input === PORTAL_PASSWORD) {
                const gate = document.getElementById('passwordGate');
                gate.style.opacity = '0';
                gate.style.pointerEvents = 'none';
                setTimeout(() => {
                    gate.style.display = 'none';
                    document.getElementById('appRoot').classList.remove('hidden');
                }, 350);
            } else {
                errorEl.classList.remove('hidden');
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').classList.add('shake');
                setTimeout(() => document.getElementById('passwordInput').classList.remove('shake'), 500);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const pwInput = document.getElementById('passwordInput');
            pwInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') checkPassword();
                document.getElementById('passwordError').classList.add('hidden');
            });
            pwInput.focus();
        });
    </script>

    <!-- Application Logic -->
    <script src="app.js"></script>
</body>
</html>
